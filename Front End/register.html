<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Registration</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="form-container">

    <div class="form-card register-card">

        <div class="form-icon register-icon">

            <i class="fa-solid fa-user-plus"></i>

        </div>

        <h1>Student Registration</h1>

        <p>
            Create your account to access courses, monitor progress,
            and begin your learning journey.
        </p>

        <form>

            <label>
                <i class="fa-solid fa-user"></i>
                Full Name
            </label>

            <input
                type="text"
                placeholder="Enter your full name"
                required>

            <label>
                <i class="fa-solid fa-id-card"></i>
                Register Number
            </label>

            <input
                type="text"
                placeholder="Enter your register number"
                required>

            <label>
                <i class="fa-solid fa-envelope"></i>
                Email Address
            </label>

            <input
                type="email"
                placeholder="Enter your email address"
                required>

            <label>
                <i class="fa-solid fa-phone"></i>
                Phone Number
            </label>

            <input
                type="tel"
                placeholder="Enter your phone number"
                required>

            <label>
                <i class="fa-solid fa-building-columns"></i>
                Department
            </label>

            <select required>

                <option>Select Department</option>

                <option>B.Sc Computer Science with AI</option>

                <option>B.Sc Computer Science</option>

                <option>BCA</option>

                <option>B.Com</option>

                <option>BBA</option>

            </select>

            <label>
                <i class="fa-solid fa-calendar-days"></i>
                Year of Study
            </label>

            <select required>

                <option>Select Year</option>

                <option>First Year</option>

                <option>Second Year</option>

                <option>Third Year</option>

            </select>

            <label>
                <i class="fa-solid fa-lock"></i>
                Password
            </label>

            <input
                type="password"
                placeholder="Create a password"
                required>

            <label>
                <i class="fa-solid fa-lock"></i>
                Confirm Password
            </label>

            <input
                type="password"
                placeholder="Confirm your password"
                required>

            <button class="form-btn register-main">

                <i class="fa-solid fa-user-check"></i>

                Register

            </button>

        </form>

        <div class="bottom-text">

            Already have an account?

            <a href="student-login.html">

                Login Here

            </a>

        </div>

    </div>

</div>

</body>

</html>

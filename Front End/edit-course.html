<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Course</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>

            <i class="fa-solid fa-user-shield"></i>

            SCMS

        </h2>

        <p>Administrator Panel</p>

        <ul>

            <li>

                <a href="admin-dashboard.html">

                    <i class="fa-solid fa-house"></i>

                    Dashboard

                </a>

            </li>

            <li class="active">

                <a href="manage-courses.html">

                    <i class="fa-solid fa-book"></i>

                    Manage Courses

                </a>

            </li>

            <li>

                <a href="add-course.html">

                    <i class="fa-solid fa-circle-plus"></i>

                    Add Course

                </a>

            </li>

            <li>

                <a href="manage-students.html">

                    <i class="fa-solid fa-users"></i>

                    Manage Students

                </a>

            </li>

            <li>

                <a href="view-enrollments.html">

                    <i class="fa-solid fa-user-check"></i>

                    Enrollments

                </a>

            </li>

            <li>

                <a href="admin-login.html">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </a>

            </li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="topbar">

            <h1>Edit Course</h1>

            <br>

            <p>

                Update the selected course information.

            </p>

        </div>

        <div class="course-card">

            <form>

                <label>Course Code</label>

                <input type="text" value="AI101">

                <label>Course Name</label>

                <input type="text" value="Artificial Intelligence">

                <label>Category</label>

                <select>

                    <option>Artificial Intelligence</option>

                    <option>Programming</option>

                    <option>Database</option>

                    <option>Computer Science</option>

                    <option>Cloud Computing</option>

                    <option>Cyber Security</option>

                    <option>Data Science</option>

                    <option>Design</option>

                </select>

                <label>Duration</label>

                <input type="text" value="12 Weeks">

                <label>Level</label>

                <select>

                    <option>Beginner</option>

                    <option>Intermediate</option>

                    <option>Advanced</option>

                </select>

                <label>Course Description</label>

                <textarea>Learn AI fundamentals, intelligent agents and problem-solving techniques.</textarea>

                <div class="form-buttons">

                    <button type="submit" class="student-btn">

                        <i class="fa-solid fa-pen"></i>

                        Update Course

                    </button>

                    <a href="manage-courses.html">

                        <button type="button" class="delete-btn">

                            <i class="fa-solid fa-arrow-left"></i>

                            Cancel

                        </button>

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
